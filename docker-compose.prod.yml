services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: always

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://easysteps:${POSTGRES_PASSWORD}@db:5432/easysteps
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: easysteps
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: easysteps
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easysteps"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

volumes:
  pgdata:
  caddy_data:
  caddy_config:
