[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present. Defaults to the
# current working directory.
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# the output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# NOTE: sqlalchemy.url is intentionally left empty here.
# The URL is loaded from the DATABASE_URL environment variable in migrations/env.py.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
